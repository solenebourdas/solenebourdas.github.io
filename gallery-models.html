<main class="gallery-page">
    <a href="Gallery.html" class="back-link">← Back to Gallery</a>

   <model-viewer
  id="antScene"
  src="Models/ant_with_gut.glb"
  alt="Ant with gut"
  auto-rotate
  camera-controls
  shadow-intensity="1"
  environment-image="neutral"
  style="width:100%; height:70vh;">
</model-viewer>

<button id="toggleAntBtn">Hide Ant</button>
   

    <button id="toggleBtn">Show Gut Only</button>
 
  </main>

  <footer>
    <p>&copy; 2026 Solène Bourdas</p>
  </footer>

 <script>
  const model = document.getElementById('antScene');
const btn = document.getElementById('toggleAntBtn');

// Wait until model is loaded
model.addEventListener('load', () => {
  const scene = model.scene; // three.js scene
  const antMesh = scene.getObjectByName('Ant'); // must match the object name in Blender
  const gutMesh = scene.getObjectByName('Gut');

  btn.addEventListener('click', () => {
    antMesh.visible = !antMesh.visible;
    btn.textContent = antMesh.visible ? 'Hide Ant' : 'Show Ant';
  });
});
  </script>
