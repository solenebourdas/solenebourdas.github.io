<body>

  <nav>

<main class="gallery-page">
    <a href="Gallery.html" class="back-link">← Back to Gallery</a>

   <model-viewer
  id="antScene"
  src="Models/ant_with_gut.glb"
  alt="Ant with gut"
  auto-rotate
  camera-controls
  shadow-intensity="1"
  environment-image="neutral"
  style="width:100%; height:70vh;">
</model-viewer>

<button id="toggleAntBtn">Hide Ant</button>
   
  </main>

  <footer>
    <p>&copy; 2026 Solène Bourdas</p>
  </footer>


<script>
console.log("JS is running");

const model = document.getElementById('antScene');
const btn = document.getElementById('toggleAntBtn');

console.log("Waiting for model...");

model.addEventListener('load', () => {
  console.log("Model loaded!");

  function waitForScene() {
    if (!model.model || !model.model.scene) {
      requestAnimationFrame(waitForScene);
      return;
    }

    const scene = model.model.scene;
    console.log("Scene ready!");

    // 🔍 Print all object names
    scene.traverse((obj) => {
      console.log(obj.name);
    });

    let antMesh = null;

    scene.traverse((obj) => {
      if (obj.name.includes('body')) {
        antMesh = obj;
      }
    });

    if (!antMesh) {
      console.warn("Ant mesh not found!");
      return;
    }

    let visible = true;

    btn.addEventListener('click', () => {
      visible = !visible;

      antMesh.traverse((child) => {
        child.visible = visible;
      });

      btn.textContent = visible ? 'Hide Ant' : 'Show Ant';
    });
  }

  waitForScene();
});
</script>

</body>
</html>
