<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

</head>
<body>
  
  
  <!-- Header / Menu -->
<header>
  <h1>Solène Bourdas</h1>
  <nav>
    <a href="index.html">About me</a> 
    <a href="Research.html">Research</a> 
    <a href="CV.html">CV</a> 
    <a href="Publications.html">Publications</a> 
    <a href="Communication.html">Communication</a>
    <a href="Gallery.html">Gallery</a> 
  </nav>
</header>

<main class="gallery-page">
    <a href="Gallery.html" class="back-link">← Back to Gallery</a>

   <model-viewer
  id="antScene"
  src="Models/ant_with_gut.glb"
  alt="Ant with gut"
  auto-rotate
  camera-controls
  shadow-intensity="1"
  environment-image="neutral"
  style="width:100%; height:70vh;">
</model-viewer>

<button id="toggleAntBtn">Hide Ant</button>
   
  </main>

  <footer>
    <p>&copy; 2026 Solène Bourdas</p>
  </footer>


<script>
const model = document.getElementById('antScene');
const btn = document.getElementById('toggleAntBtn');

model.addEventListener('load', async () => {

  await model.updateComplete; // ✅ wait until model is fully ready

  const scene = model.model.scene;

  // 🔍 Debug: print all object names
  scene.traverse((obj) => {
    console.log(obj.name);
  });

  let antMesh = null;

  scene.traverse((obj) => {
    if (obj.name.includes('body')) {
      antMesh = obj;
    }
  });

  if (!antMesh) {
    console.warn("Ant mesh not found!");
    return;
  }

  let visible = true;

  btn.addEventListener('click', () => {
    visible = !visible;

    antMesh.traverse((child) => {
      child.visible = visible;
    });

    btn.textContent = visible ? 'Hide Ant' : 'Show Ant';
  });

});
</script>


</body>
</html>
