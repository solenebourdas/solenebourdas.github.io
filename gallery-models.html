<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - Solène Bourdas</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  
  <!-- Header / Menu -->
<header>
  <h1>Solène Bourdas</h1>
  <nav>
    <a href="index.html">About me</a> 
    <a href="Research.html">Research</a> 
    <a href="CV.html">CV</a> 
    <a href="Publications.html">Publications</a> 
    <a href="Communication.html">Communication</a>

  </nav>
</header>

  <!-- Main Content -->
 <main class="gallery-page">

  <a href="Gallery.html" class="back-link">← Back to Gallery</a>
<div class="model-container">
  <model-viewer
    id="antModel"
    src="Models/ant.glb"
    alt="3D ant"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    style="width: 100%; height: 70vh; position:absolute;">
  </model-viewer>

  <model-viewer
    id="gutModel"
    src="Models/gut1.glb"
    alt="Ant gut"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    style="width: 100%; height: 70vh; position:absolute; display:none;">
  </model-viewer>
</div>

<button id="toggleBtn">Show Gut Only</button>

</main>

    <!-- Footer -->
  <footer>
    <p>&copy; 2026 Solène Bourdas</p>
  </footer>
  
</body>
</html>
