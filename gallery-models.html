<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - Solène Bourdas</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  
  
  <!-- Header / Menu -->
<header>
  <h1>Solène Bourdas</h1>
  <nav>
    <a href="index.html">About me</a> 
    <a href="Research.html">Research</a> 
    <a href="CV.html">CV</a> 
    <a href="Publications.html">Publications</a> 
    <a href="Communication.html">Communication</a>
    <a href="Gallery.html">Gallery</a> 
  </nav>
</header>

<main class="gallery-page">
    <a href="Gallery.html" class="back-link">← Back to Gallery</a>

 <div class="model-container" style="position: relative; width: 100%; height: 70vh;">
  <!-- Ant model -->
  <model-viewer
    id="antModel"
    src="Models/ant.glb"
    alt="Ant"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    environment-image="neutral"
    style="position: absolute; width: 100%; height: 100%;">
  </model-viewer>

  <!-- Gut model -->
  <model-viewer
    id="gutModel"
    src="Models/gut1.glb"
    alt="Gut"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    environment-image="neutral"
    style="position: absolute; width: 100%; height: 100%;">
  </model-viewer>
</div>

<button id="toggleAntBtn">Hide Ant</button>


 <footer>
    <p>&copy; 2026 Solène Bourdas</p>
  </footer>



  
<script>
const ant = document.getElementById('antModel');
const btn = document.getElementById('toggleAntBtn');

btn.addEventListener('click', () => {
  if (ant.style.display === 'none') {
    ant.style.display = 'block';
    btn.textContent = 'Hide Ant';
  } else {
    ant.style.display = 'none';
    btn.textContent = 'Show Ant';
  }
});
</script>
  
 


</body>
</html>
