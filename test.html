<!-- Tag 2: your actual code -->
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
// ✅ Declare container FIRST
const container = document.getElementById("viewer");

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

// ✅ Camera uses container AFTER it's declared
const camera = new THREE.PerspectiveCamera(
  45,
  container.clientWidth / container.clientHeight,
  0.1,
  100
);
camera.position.set(0, 1, 3);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// ✅ Store the part you want to toggle
let gutMesh = null;

const loader = new GLTFLoader();
loader.load("Models/Remiped2.glb", function (gltf) {
  const model = gltf.scene;
  scene.add(model);

  // ✅ Log ALL mesh names so you can find the right one
  model.traverse(child => {
    if (child.isMesh) {
      console.log("Mesh found:", child.name);
    }
  });

  // ✅ CHANGE "gut" to whatever your Blender object is named
  gutMesh = model.getObjectByName("gut");
  if (!gutMesh) {
    console.warn("⚠️ Mesh 'gut' not found. Check names logged above.");
  }
});

// Toggle (global)
window.toggleGut = function () {
  if (gutMesh) {
    gutMesh.visible = !gutMesh.visible;
  } else {
    console.warn("Gut mesh not loaded yet or name is wrong.");
  }
};

// Resize
window.addEventListener("resize", () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
