<!DOCTYPE html>
<html lang="en"> 
  <head> 
    <meta charset="UTF-8"> 
    <title>Gallery - Solène Bourdas</title> 
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:,">

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap');

      .model-container {
        width: 100%;
        height: 400px;
        position: relative;
        cursor: crosshair;
        background: #0d0d0d;
      }

      .viewer-wrapper {
        max-width: 900px;
        margin: 2rem auto;
        border: 1px solid #d8d2c8;
      }

      .viewer-label {
        display: flex;
        align-items: baseline;
        gap: 1.2rem;
        padding: 0.75rem 1.2rem;
        border-bottom: 1px solid #d8d2c8;
        background: #faf9f6;
      }

      .viewer-title {
        font-family: 'Crimson Pro', serif;
        font-style: italic;
        font-size: 1.05rem;
        color: #1a1a1a;
        letter-spacing: 0.01em;
      }

      .viewer-subtitle {
        font-family: 'DM Mono', monospace;
        font-size: 0.68rem;
        font-weight: 300;
        color: #666;
        letter-spacing: 0.04em;
      }

      .viewer-hint {
        font-family: 'DM Mono', monospace;
        font-size: 0.62rem;
        color: #aaa;
        margin-left: auto;
        letter-spacing: 0.04em;
      }

      .viewer-controls {
        display: flex;
        gap: 0.75rem;
        padding: 0.75rem 1.2rem;
        border-top: 1px solid #d8d2c8;
        background: #faf9f6;
        align-items: center;
        flex-wrap: wrap;
      }

      .viewer-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 1rem;
        border: 1px solid #c8c2b8;
        background: #fff;
        font-family: 'DM Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        color: #333;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .viewer-btn:hover {
        background: #1a1a1a;
        color: #fff;
        border-color: #1a1a1a;
      }

      .viewer-btn.secondary {
        color: #999;
        border-color: #ddd;
      }

      .viewer-btn.secondary:hover {
        background: #1a1a1a;
        color: #fff;
        border-color: #1a1a1a;
      }

      .btn-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
        transition: opacity 0.2s;
      }

      .btn-dot.hidden {
        opacity: 0.25;
      }

      .btn-dot-body { background: #a8c5e8; }

      .controls-divider {
        width: 1px;
        height: 24px;
        background: #d8d2c8;
        margin: 0 0.25rem;
      }

      .slider-group {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        opacity: 1;
        transition: opacity 0.2s;
      }

      .slider-group.disabled {
        opacity: 0.3;
        pointer-events: none;
      }

      .slider-label {
        font-family: 'DM Mono', monospace;
        font-size: 0.67rem;
        color: #888;
        letter-spacing: 0.05em;
      }

      .slider-value {
        font-family: 'DM Mono', monospace;
        font-size: 0.67rem;
        color: #888;
        width: 2.5rem;
      }

      .opacity-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100px;
        height: 1px;
        background: #c8c2b8;
        outline: none;
        cursor: pointer;
      }

      .opacity-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #1a1a1a;
        cursor: pointer;
        transition: background 0.15s;
      }

      .opacity-slider::-webkit-slider-thumb:hover {
        background: #a8c5e8;
      }

      .opacity-slider::-moz-range-thumb {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #1a1a1a;
        cursor: pointer;
        border: none;
      }

      .viewer-loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0d0d0d;
        z-index: 10;
        font-family: 'DM Mono', monospace;
        font-size: 0.7rem;
        color: #555;
        letter-spacing: 0.08em;
        transition: opacity 0.6s ease;
      }

      .viewer-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loading-bar {
        width: 160px;
        height: 1px;
        background: #333;
      }

      .loading-fill {
        height: 100%;
        background: #e8c547;
        width: 0%;
        transition: width 0.3s ease;
      }
    </style>
  </head>

<body>

<header>
  <h1>Solène Bourdas</h1>
  <nav>
    <a href="index.html">About me</a> 
    <a href="Research.html">Research</a> 
    <a href="CV.html">CV</a> 
    <a href="Publications.html">Publications</a> 
    <a href="Communication.html">Communication</a>
    <a href="Gallery.html">Gallery</a> 
  </nav>
</header>

<main class="models-page">
  <a href="Gallery.html" class="back-link">← Back to Gallery</a>

  <p class="cv-intro2">
    Explore and interact with my 3D reconstructions below!
  </p>

  <div class="viewer-wrapper">

    <div class="viewer-label">
      <span class="viewer-title">Remiped crustacean</span>
      <span class="viewer-subtitle">Body (blue) · Gut (yellow)</span>
      <span class="viewer-hint">Drag to rotate · Scroll to zoom</span>
    </div>

    <div class="model-container" id="viewer">
      <div class="viewer-loading" id="loading">
        <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
        <span>Loading model…</span>
      </div>
    </div>

    <div class="viewer-controls">

      <!-- Body controls only -->
      <button class="viewer-btn" id="toggleBodyBtn" onclick="toggleBody()">
        <span class="btn-dot btn-dot-body" id="bodyDot"></span>
        Body
      </button>
      <div class="slider-group" id="bodySliderGroup">
        <label class="slider-label">Opacity</label>
        <input type="range" min="0" max="100" value="100" class="opacity-slider" id="bodySlider" oninput="setBodyOpacity(this.value)">
        <span class="slider-value" id="bodySliderValue">100%</span>
      </div>

      <div class="controls-divider"></div>

      <!-- Reset -->
      <button class="viewer-btn secondary" onclick="resetCamera()">
        Reset view
      </button>

    </div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Solène Bourdas</p>
</footer>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const container = document.getElementById("viewer");
const loadingEl = document.getElementById("loading");
const loadingFill = document.getElementById("loadingFill");

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);

// Camera
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 0.5;
controls.maxDistance = 50;

// Lights
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x222222, 1.2);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0x8899cc, 0.4);
rimLight.position.set(-5, -2, -5);
scene.add(rimLight);

// Mesh groups
let bodyMeshes = [];
let bodyVisible = true;
let defaultCameraPos = new THREE.Vector3();
let defaultTarget    = new THREE.Vector3();

function setOpacity(meshes, opacity) {
  meshes.forEach(mesh => {
    mesh.traverse(child => {
      if (child.isMesh) {
        child.material.transparent = opacity < 1.0;
        child.material.opacity = opacity;
        child.material.needsUpdate = true;
      }
    });
  });
}

const loader = new GLTFLoader();
loader.load(
  "Models/Remiped3.glb",
  function (gltf) {
    const model = gltf.scene;

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    model.position.sub(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(0, maxDim * 0.4, maxDim * 1.2);
    controls.target.set(0, 0, 0);
    controls.update();

    defaultCameraPos.copy(camera.position);
    defaultTarget.copy(controls.target);

    scene.add(model);

    model.traverse(child => {
      if (child.isMesh) console.log("Mesh found:", child.name);
    });

    const body1 = model.getObjectByName("body1");
    const body2 = model.getObjectByName("body2");
    if (body1) bodyMeshes.push(body1);
    if (body2) bodyMeshes.push(body2);

    if (bodyMeshes.length === 0) console.warn("⚠️ No body meshes found.");

    loadingFill.style.width = "100%";
    setTimeout(() => loadingEl.classList.add("fade-out"), 300);
  },
  function (xhr) {
    if (xhr.lengthComputable) {
      loadingFill.style.width = (xhr.loaded / xhr.total * 90) + "%";
    }
  },
  function (err) {
    console.error("Model load error:", err);
    loadingEl.innerHTML = "<span style='color:#c0392b'>Failed to load model.</span>";
  }
);

// Body toggle
window.toggleBody = function () {
  bodyVisible = !bodyVisible;
  const slider = document.getElementById("bodySlider");
  const val = bodyVisible ? slider.value / 100 : 0;
  setOpacity(bodyMeshes, val);
  document.getElementById("bodySliderGroup").classList.toggle("disabled", !bodyVisible);
  document.getElementById("bodyDot").classList.toggle("hidden", !bodyVisible);
  document.getElementById("toggleBodyBtn").style.color = bodyVisible ? "" : "#aaa";
};

// Body opacity slider
window.setBodyOpacity = function (value) {
  document.getElementById("bodySliderValue").textContent = value + "%";
  if (bodyVisible) setOpacity(bodyMeshes, value / 100);
};

// Reset camera
window.resetCamera = function () {
  camera.position.copy(defaultCameraPos);
  controls.target.copy(defaultTarget);
  controls.update();
};

// Resize
window.addEventListener("resize", () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
